name: first_check_2
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_hooks: ^0.21.3+1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Backend
  supabase_flutter: ^2.12.0

  # OCR
  google_mlkit_text_recognition: ^0.14.0

  # Camera & Permissions
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Location & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utils
  get_it: ^8.0.3
  intl: ^0.19.0
  go_router: ^14.7.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  equatable: ^2.0.7
  fl_chart: ^1.1.1
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  mockito: ^5.4.4

